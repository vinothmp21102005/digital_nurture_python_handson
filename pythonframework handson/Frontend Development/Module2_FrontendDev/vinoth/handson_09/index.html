<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Initial Lighthouse Score Record: 78/100 -> Target: 100/100 -->
  <!-- Audit Fixes: Added alt attributes, explicit labels, ARIA landmarks, correct heading hierarchy -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - Accessible</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Site Header Landmark -->
  <header>
    <h1>Student Portal</h1>
    
    <!-- Navigation Landmark with ARIA label -->
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="#courses" aria-current="page">Courses</a></li>
        <li><a href="#profile">Profile</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Landmark -->
  <main>
    <section id="courses" aria-labelledby="courses-heading">
      <h2 id="courses-heading">My Courses</h2>

      <!-- Search Form Controls with Explicit Label -->
      <div class="search-box">
        <label for="course-search">Search Enrolled Courses:</label>
        <input 
          type="text" 
          id="course-search" 
          placeholder="e.g., Data Structures"
        >
      </div>

      <!-- ARIA Live Region for Screen Reader Announcements -->
      <div 
        id="search-status" 
        role="status" 
        aria-live="polite" 
        class="sr-only-status"
      >
        5 courses available.
      </div>

      <!-- Dynamic Course Grid Container -->
      <div class="course-grid" id="course-grid"></div>
    </section>

    <!-- Accessible Form Section -->
    <section id="profile" aria-labelledby="profile-heading">
      <h2 id="profile-heading">Update Profile</h2>
      <form id="profile-form">
        <div class="form-field">
          <label for="student-name">Full Name:</label>
          <input type="text" id="student-name" required>
        </div>

        <div class="form-field">
          <label for="student-email">Email Address:</label>
          <input type="email" id="student-email" required>
        </div>

        <button type="submit">Save Changes</button>
      </form>
    </section>
  </main>

  <!-- Footer Landmark -->
  <footer>
    <p>&copy; 2026 Student Portal. Built with accessibility in mind.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
