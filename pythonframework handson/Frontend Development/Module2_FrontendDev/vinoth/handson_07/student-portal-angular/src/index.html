<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>StudentPortalAngular</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.body.innerHTML = '<h2 style="color:red">Runtime Error:</h2>' + 
        '<p><b>Message:</b> ' + msg + '</p>' +
        '<p><b>Location:</b> ' + url + ':' + lineNo + ':' + columnNo + '</p>' +
        '<pre>' + (error ? error.stack : '') + '</pre>';
      return false;
    };
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
